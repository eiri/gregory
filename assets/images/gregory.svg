<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6e1f5"/>
      <stop offset="100%" stop-color="#d7d0eb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcd5ee"/>
      <stop offset="100%" stop-color="#c8c0e0"/>
    </linearGradient>
    <linearGradient id="knobFace" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#e0d9f0"/>
      <stop offset="100%" stop-color="#b8b0d4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4b3778" flood-opacity="0.18"/>
    </filter>
    <filter id="knobShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#4b3778" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>

  <!-- Main panel -->
  <rect x="80" y="180" width="864" height="580" rx="32" ry="32"
        fill="url(#panel)" stroke="#8c7daf" stroke-width="2" filter="url(#shadow)"/>

  <!-- Panel inner edge highlight -->
  <rect x="82" y="182" width="860" height="576" rx="31" ry="31"
        fill="none" stroke="#e8e2f8" stroke-width="1.5" opacity="0.6"/>

  <!-- ── SLIDERS (left cluster) ── -->
  <!-- Slider track 1 -->
  <rect x="148" y="260" width="8" height="200" rx="4" fill="#b8b0d4"/>
  <!-- Slider fill 1 -->
  <rect x="148" y="340" width="8" height="120" rx="4" fill="#4b3778"/>
  <!-- Slider handle 1 -->
  <rect x="136" y="328" width="32" height="18" rx="5" fill="#c8c0e0" stroke="#4b3778" stroke-width="2" filter="url(#knobShadow)"/>

  <!-- Slider track 2 -->
  <rect x="212" y="260" width="8" height="200" rx="4" fill="#b8b0d4"/>
  <!-- Slider fill 2 -->
  <rect x="212" y="290" width="8" height="170" rx="4" fill="#4b3778"/>
  <!-- Slider handle 2 -->
  <rect x="200" y="278" width="32" height="18" rx="5" fill="#c8c0e0" stroke="#4b3778" stroke-width="2" filter="url(#knobShadow)"/>

  <!-- Slider track 3 -->
  <rect x="276" y="260" width="8" height="200" rx="4" fill="#b8b0d4"/>
  <!-- Slider fill 3 -->
  <rect x="276" y="370" width="8" height="90" rx="4" fill="#4b3778"/>
  <!-- Slider handle 3 -->
  <rect x="264" y="358" width="32" height="18" rx="5" fill="#c8c0e0" stroke="#4b3778" stroke-width="2" filter="url(#knobShadow)"/>

  <!-- Slider track 4 -->
  <rect x="340" y="260" width="8" height="200" rx="4" fill="#b8b0d4"/>
  <!-- Slider fill 4 -->
  <rect x="340" y="310" width="8" height="150" rx="4" fill="#4b3778"/>
  <!-- Slider handle 4 -->
  <rect x="328" y="298" width="32" height="18" rx="5" fill="#c8c0e0" stroke="#4b3778" stroke-width="2" filter="url(#knobShadow)"/>

  <!-- Slider labels -->
  <text x="152" y="488" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">A</text>
  <text x="216" y="488" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">D</text>
  <text x="280" y="488" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">S</text>
  <text x="344" y="488" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">R</text>

  <!-- ── KNOBS (right cluster) ── -->

  <!-- Knob macro: cx, cy, r=64, value angle -->
  <!-- Knob 1 — CUTOFF, ~75% -->
  <g transform="translate(520, 340)" filter="url(#knobShadow)">
    <circle r="58" fill="url(#knobFace)" stroke="#8c7daf" stroke-width="2.5"/>
    <circle r="50" fill="none" stroke="#4b3778" stroke-width="4" stroke-dasharray="220 314" stroke-dashoffset="-47" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-36" stroke="#4b3778" stroke-width="5" stroke-linecap="round"
          transform="rotate(75)"/>
    <circle r="7" fill="#4b3778"/>
  </g>
  <text x="520" y="432" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">CUTOFF</text>

  <!-- Knob 2 — RES, ~40% -->
  <g transform="translate(680, 340)" filter="url(#knobShadow)">
    <circle r="58" fill="url(#knobFace)" stroke="#8c7daf" stroke-width="2.5"/>
    <circle r="50" fill="none" stroke="#4b3778" stroke-width="4" stroke-dasharray="126 314" stroke-dashoffset="-47" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-36" stroke="#4b3778" stroke-width="5" stroke-linecap="round"
          transform="rotate(-15)"/>
    <circle r="7" fill="#4b3778"/>
  </g>
  <text x="680" y="432" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">RES</text>

  <!-- Knob 3 — GAIN, ~55% -->
  <g transform="translate(840, 340)" filter="url(#knobShadow)">
    <circle r="58" fill="url(#knobFace)" stroke="#8c7daf" stroke-width="2.5"/>
    <circle r="50" fill="none" stroke="#4b3778" stroke-width="4" stroke-dasharray="165 314" stroke-dashoffset="-47" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-36" stroke="#4b3778" stroke-width="5" stroke-linecap="round"
          transform="rotate(25)"/>
    <circle r="7" fill="#4b3778"/>
  </g>
  <text x="840" y="432" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6b5a8c" letter-spacing="1">GAIN</text>

  <!-- ── TOGGLE BUTTONS (bottom row) ── -->
  <rect x="460" y="490" width="100" height="36" rx="8" fill="#4b3778"/>
  <text x="510" y="514" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#e6e1f5" letter-spacing="2">SAW</text>

  <rect x="572" y="490" width="100" height="36" rx="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <text x="622" y="514" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#6b5a8c" letter-spacing="2">SQR</text>

  <rect x="692" y="490" width="100" height="36" rx="8" fill="#4b3778"/>
  <text x="742" y="514" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#e6e1f5" letter-spacing="2">LP4</text>

  <rect x="804" y="490" width="100" height="36" rx="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <text x="854" y="514" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#6b5a8c" letter-spacing="2">LP2</text>

  <!-- ── DIVIDER LINE ── -->
  <line x1="420" y1="240" x2="420" y2="720" stroke="#8c7daf" stroke-width="1.5" opacity="0.4"/>

  <!-- ── TITLE ── -->
  <text x="512" y="136" text-anchor="middle"
        font-family="sans-serif" font-weight="700" font-size="72"
        fill="#4b3778" letter-spacing="12">GREGORY</text>
  <text x="512" y="170" text-anchor="middle"
        font-family="sans-serif" font-size="26"
        fill="#8c7daf" letter-spacing="6">monosynth</text>

  <!-- ── SECTION LABELS (panel top) ── -->
  <text x="248" y="248" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#8c7daf" letter-spacing="3">AMP ENV</text>
  <text x="680" y="256" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#8c7daf" letter-spacing="3">FILTER</text>

  <!-- Subtle corner screws -->
  <circle cx="116" cy="216" r="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <line x1="111" y1="216" x2="121" y2="216" stroke="#8c7daf" stroke-width="1.5"/>
  <circle cx="908" cy="216" r="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <line x1="903" y1="216" x2="913" y2="216" stroke="#8c7daf" stroke-width="1.5"/>
  <circle cx="116" cy="724" r="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <line x1="111" y1="724" x2="121" y2="724" stroke="#8c7daf" stroke-width="1.5"/>
  <circle cx="908" cy="724" r="8" fill="#c8c0e0" stroke="#8c7daf" stroke-width="1.5"/>
  <line x1="903" y1="724" x2="913" y2="724" stroke="#8c7daf" stroke-width="1.5"/>
</svg>
